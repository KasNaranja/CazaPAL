name: Build CazaPAL (Windows installer)

# Cómo obtener tu .exe:
#  • Cada push a "main" compila el instalador y lo deja en "Artifacts".
#  • Si creas una etiqueta tipo v1.0.0, además publica una Release con el .exe.
#  • También puedes lanzarlo a mano en la pestaña Actions → "Run workflow".

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Next.js (standalone) + Electron installer
        run: npm run electron:build
        env:
          # electron-builder no debe intentar publicar por su cuenta.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CazaPAL-Windows-Installer
          path: dist/*.exe
          if-no-files-found: error

      - name: Publish Release (solo en etiquetas v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
